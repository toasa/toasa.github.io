<p>雨。平日初日の雨はやめてください。ヨロ。</p>
<p>朝。出勤前にランニング。ずぶ濡れで井の頭公園を二周。
朝に体温を上げとくのは、やはり良い。
臨戦態勢に入れる。早起き面倒だけど。</p>
<p>お昼。コンビニでおにぎりとちくわを買う。</p>
