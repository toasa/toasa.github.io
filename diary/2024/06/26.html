		<h2>2024/06/26</h2>
		<div><h3>水曜日</h3>
<p>曇り、そこそこ暑い日。</p>
<p>新居が決まったのでインターネットの契約を更新する。
はじめは電話口で更新しようと思ったが、15分待っても繋がらなかったので、
ネットで手続きを仮完了。近々折り返しの電話がかかって来るらしい。
じゃあ最初から電話で完結させてほしくはある。</p>
<p>お昼。昨日ほどじゃないけど、そこそこ暑い。
にしても雨降らないな。</p>
<p>夜ご飯。鶏もも肉とネギの炒め物。</p>
