		<h2>2024/06/18</h2>
		<div><h3>火曜日</h3>
<p>夜まで大雨。</p>
<p>朝。土砂降りなのでお家でまったり。
雨が原因かわからないが、弊アパートの水捌け問題が発生。
前回の対応で疲れたので問題は放置。</p>
<p>都知事選の「投票所入場整理券」が届いた。
投票用紙は入っておらず驚いたが、そういえば現地で貰えるんだった。
ようつべで候補者のスピーチを聞く。
群雄割拠、お祭りのようでとても楽しい。
エンジニアの方も出てるんだね。</p>
