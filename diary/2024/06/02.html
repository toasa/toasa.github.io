		<h2>2024/06/02</h2>
		<div><h3>日曜日</h3>
<ul>
<li>鶏手羽先のコーラ煮を作る。味付けはコーラと醤油だけ。<a href="https://www.youtube.com/watch?v=Qzo590iHL70">リュウジ氏の作り方</a>を参考にする。味は美味しい。複数の香辛料が効いた、柔らかい煮物。コーラは700mLのボトルを使ったが、甘味がくどかったので 500 mL にすればよかったかも。</li>
<li><a href="https://www.youtube.com/watch?v=HvScYq9jGBA">GTワールドシリーズ 2023 | ワールドファイナル</a>。面白かった。事前知識はゼロ。タイヤの違い。ピットインするタイミング。戦略の解説わかりやすい。</li>
