		<h2>2024/06/28</h2>
		<div><h3>金曜日</h3>
<p>雨、蒸し暑い日。</p>
<p>朝から大雨。公園での読書は諦めてお家でだらだら。</p>
<p>お昼。晩御飯の買い出しと散歩。
少し雨足が弱まる。</p>
<p>夜。足りない歩数を吉祥寺歩きで稼ぐ。
晩御飯は鶏もも肉と長ネギの炒め物。</p>
<h3>Fragments</h3>
<p>引越しに伴うもろもろの手続きが発生中。
やることのリストを作っちゃえば、次回以降助かる気はする。
問題は気力よ。</p>
