		<h2>2024/06/11</h2>
		<div><h3>火曜日</h3>
<p>晴れ、暑い日。</p>
<p>朝。近所の公園で30mほど読書。
『<a href="https://www.amazon.co.jp/%E6%AD%A6%E5%99%A8%E3%81%A8%E3%81%97%E3%81%A6%E3%81%AE%E3%80%8C%E8%B3%87%E6%9C%AC%E8%AB%96%E3%80%8D-%E7%99%BD%E4%BA%95-%E8%81%A1/dp/4492212418">武器としての「資本論」</a>』。</p>
<p>昨日スーパーで買ったヤングコーンの缶詰を食べる。
100円で10本ほど入っていたが、味はそこそこ。
生のままぽりぽり食べた。</p>
<p>お昼休憩。外は気温30度。あっつい：</p>
<img src="https://i.imgur.com/ph8xEXL.jpg" width="500">
<p>終業後井の頭公園をランニング。池の周りを二周。</p>
<h3>Fragments</h3>
<p><a href="https://ja.m.wikipedia.org/wiki/%E3%83%B4%E3%82%A1%E3%83%B3%E3%83%87%E3%83%BB%E3%82%B0%E3%83%AD%E3%83%BC%E3%83%96">ヴァンデ・グローブ</a>。
単独無寄港無補給の世界一周ヨットレース。
四年に一回開催され、今年の11月10日に第10回目がスタートする。
歴代優勝者は全てフランス人なんだ。</p>
