		<div><h3>金曜日</h3>
<p>雨、蒸し暑い日。</p>
<p>朝。雨なのでお家でゴロゴロ。
SNS を見るなどで無の時間を過ごす。</p>
<p>お昼。散歩。晩御飯の買い出し。</p>
<p>夜。井の頭公園をランニング。池を一周。</p>
<p>友人Y氏とビデオチャット。
氏が減量に成功。
ベースブレッドチョコ味がおすすめ。</p>
<p>晩御飯はアスパラガス。弱火で焼いて、塩をかける。美味い。</p>
<h3>Fragments</h3>
<p>弟氏が関わる建築物の住所を聞く。
吉祥寺なので近々行ってみようかな。</p>
