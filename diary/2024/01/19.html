		<h2>2024/01/19</h2>
		<div><h3>金曜日</h3>
<p>晴れ、暖かい日。</p>
<p>朝。気温は９度。
近所の公園で１hほど読書。</p>
<p>体調はそこそこ。喉は痛むが、頭がぼんやりする感じは無くなった。出勤。</p>
<p>8876 のナンバープレートからテンパズル出来た。
テンション上がる。</p>
<p>お昼。会社周辺を散歩：</p>
<img src="https://i.imgur.com/TjsMIa2.jpg" width="500">
<p>体調が万全でないので、ランニングはお休み。
経験上、負荷の高いランニングの翌日は風邪をひきやすい気がする。
免疫力などが下がってるのかしら？</p>
<p>晩御飯は鶏もも肉と長ネギの炒め物。</p>
