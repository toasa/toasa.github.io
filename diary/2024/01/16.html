		<h2>2024/01/16</h2>
		<div><h3>火曜日</h3>
<p>晴れ、肌寒い日。</p>
<p>朝。近所の公園で20mほど読書。
寒すぎるため、残りはお家。</p>
<p>ガスコンロ問題。
センサーの手配が済んだので、工事の日程調整のための電話が来た。
朝一の9時代はあちらが先客で埋まっており、
最終の18時はこちらが仕事中。
というわけで、29日の朝一に決定。
この不便な状態が２週間弱続くことに。
センサー不調時のワークアラウンドも段々板についてきた。</p>
<p>お昼。会社周辺を散歩。</p>
<p>終業。昨日の無益な競争により右膝の調子が悪い。
曲げた状態で体重を乗せると、やや痛みがある。
アホなことしたな。</p>
