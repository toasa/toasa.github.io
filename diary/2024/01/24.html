		<h2>2024/01/24</h2>
		<div><h3>水曜日</h3>
<p>晴れ、寒い日。</p>
<p>朝。近所の公園で30mほど読書。
「極北クレイマー」の続きから。</p>
<p>お昼。会社周辺を散歩：</p>
<img src="https://i.imgur.com/KBnxx3O.jpg" width="700">
<p>終業。オフィスで帰り支度をしている時は、走る心づもりでいたが、
外に出ると寒すぎる。ランニングは断念。
そういえば体調も万全では無かった。そういえば。</p>
<p>晩御飯は鶏胸肉とニラの炒め物。</p>
<h3>プロフェッショナル 「平凡な日常は、油断ならない 〜歌人・俵万智〜」</h3>
<p>見た。</p>
<blockquote>
<p>最後とは知らぬ最後が過ぎてゆく その連続と思う子育て</p>
</blockquote>
<blockquote>
<p>むっちゃ夢中 とことん得意 どこまでも努力できれば プロフェッショナル</p>
</blockquote>
