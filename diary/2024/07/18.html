		<h2>2024/07/18</h2>
		<div><h3>木曜日</h3>
<p>晴れ、暑い日。</p>
<p>朝。マイナンバーと銀行の住所変更を済ませる。
これで引越し関係の事務手続きは一通り終わった（はず）。</p>
<p>お昼。外あっつい。33度。</p>
<p>11月におとん、おかんが東京旅行に来ることに。</p>
<p>晩御飯。鶏胸肉と玉ねぎの炒め物。
スーパーで買う玉ねぎがここ最近イマイチ。
外側を見ても古そうで、中身も部分的に腐っている。</p>
<p>もうすぐ土用の丑の日。うなぎ食べたい。</p>
