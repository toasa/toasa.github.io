		<div><h3>月曜日</h3>
<p>曇りときどき小雨、涼しい日。</p>
<p>朝。新居のゴミ出しの場所と曜日を調べた。
掃除の方に挨拶した。
ネットが開通して快適。</p>
<p>キッチンの水回りに不備。
流しで水を流すと、直下の管から水がポタポタ漏れる。
最初は水漏れに気づかなかったので、近くに置いてた書類と調味料は水浸しになってしまった。
まぁこんな問題もある。深呼吸して業者を手配。明日、検査に来ていただけることに。</p>
