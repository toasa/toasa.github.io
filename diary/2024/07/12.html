		<h2>2024/07/12</h2>
		<div><h3>金曜日</h3>
<p>雨、涼しい日。</p>
<p>職場の外出用スリッパを新調。
以前のものは100均で100円、
今回のものは100均で300円。
材質は布からゴムへ進化した。
今日のような雨でも耐水性があっていい感じ。</p>
<p>晩御飯は鶏もも肉とニラの炒め物。</p>
<p>夜の気温は22度。
涼しい。</p>
<h3>Fragments</h3>
<p>引越し荷物のパッキングは明日１日でやらなければいけない...。
頼んだぞ、明日の自分。</p>
