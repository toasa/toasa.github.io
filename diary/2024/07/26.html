		<div><h3>金曜日</h3>
<p>晴れ時々雨、暑い日。</p>
<p>朝。今日も１hほど早く出社して、勉強会の準備を進める：</p>
<img src="https://i.imgur.com/wQ4PPJC.jpg" width="500">
<p>お昼。武蔵野中央図書館まで歩いてみる。
中には入らず、引き返して散歩終了。</p>
<p>晩。会社を出ると雨が降ってた。
変な天気だな。猛暑だと、天気も変わりやすいって聞いたこともあるけど、
どういう原理なんだろ。</p>
<h3>Fragments</h3>
<p>数日前に部屋で拾ったゴム製のキャップ。
用途がわからなかったため、見つけた瞬間に捨てようと思ったが、
今までの経験からそのうち出どころがわかるはず、と思いとっておいた。
ビンゴ。アイロン台の脚につけるキャップでした。</p>
