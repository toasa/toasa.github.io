		<h2>2024/07/30</h2>
		<div><h3>火曜日</h3>
<p>曇りのち雨、蒸し暑い日。</p>
<p>朝。疲れがあったので、出勤直前までお家でだらだら。</p>
<p>お昼。中央図書館の目の前まで散歩。
曇り空とはいえ日傘を指すと、少しだけ涼しい気がする。</p>
<p>夜。晩御飯は豚ロースト玉ねぎの炒め物。
疲れが取れたらまたランニングに行こう。</p>
<h3>Fragments</h3>
<p><a href="https://github.com/toasa/diary/blob/main/2024/07/28.md">二日前</a>に自転車の空気を入れ、
今日確認したところまだ十分残ってそう。
実感できないほど微量に減ってる可能性もあるので、もう少し様子見。</p>
