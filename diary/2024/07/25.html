		<h2>2024/07/25</h2>
		<div><h3>木曜日</h3>
<p>晴れ時々雨、暑い日。</p>
<p>朝。通勤時間を計測してみる。
割とサクサク歩いて25分。まあまあかかるな。</p>
<p>お昼。あっつい中日傘を刺して歩く。</p>
<p>夕方に雷の音。小雨も降ったみたい。変な天気。</p>
<p>晩御飯。豚肉と長ネギの炒め物。
豚肉って、鶏肉と比べてお腹にたまらない気がする。
あと、若干翌日のお腹・腸のスッキリ感が劣る。
味はとても美味しいけどね。</p>
