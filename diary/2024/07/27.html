		<div><h3>土曜日</h3>
<p>晴れ時々雨、あっつい日。</p>
<p>朝。武蔵野プレイスで雑誌をぱらぱら読む。
図書館涼しい。</p>
<p>お昼。いい感じのパン屋を見つけた。フランスパンを買って、生ハムとレタスとチーズのサンドイッチにする。
めちゃうまい。</p>
<p>晩御飯。鶏もも肉を焼いてレトルトカレーをかけたやつ。</p>
