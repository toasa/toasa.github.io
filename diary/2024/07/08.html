		<h2>2024/07/08</h2>
		<div><h3>月曜日</h3>
<p>晴れ、あつい日。</p>
<p>朝。外が暑すぎる。
ベンチに座っているだけでも汗が出るので、お家で過ごす。</p>
<p>お昼。外は37度。
暑すぎて頭がぼんやりする。
呼吸が浅くなる。</p>
<p>夜。吉祥寺のニトリで注文した敷布団カバーを受け取る。
晩御飯は鶏胸肉を焼いてレトルトカレーをかけたやつ。</p>
