<p>塔の上から重い物と軽い物を同時に落とし、同時に地面に到達した実験。
重さが違うのに同時につくのは何故だっけ？
ChatGPT 理由を聞いてまとめる：</p>
<blockquote>
<p>２つの物体の質量が２倍違う場合、運動方程式 $F = ma$ より、下向きの力は２倍違う。また運動方程式より $a = \frac{F}{m}$ なので、分子も分母も２倍大きくなり、加速度は変わらない。</p>
</blockquote>
<p>やっぱり腑に落ちないのは、そもそも加速度が体に染み込んでないんだろうな。</p>
