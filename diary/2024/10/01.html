		<h2>2024/10/01</h2>
		<div><h3>火曜日</h3>
<p>朝。空気がひんやりしているため、通勤の徒歩が気持ちいい。</p>
<p>お仕事。<a href="https://linux.die.net/man/1/join">join コマンド</a>の存在を知る。SQL の join みたいなことができる。便利。</p>
<p>お昼。
武蔵野中央図書館まで散歩。
お昼ご飯はセブンイレブンの塩おにぎりとちくわ。
ちくわは英語でFish cake。ほお、知らなんだ。</p>
<p>夜。境浄水場の周りをランニング。
晩御飯は鶏もも肉と玉ねぎの炒め物。</p>
