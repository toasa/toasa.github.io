<p>お昼休み。
諸々の報告のため旧居まで行ってみたが、掃除のおばさんには出会えず。
もしかすると契約期間が終わったのかもしれない。</p>
<p>お仕事。ちょっと前進。いいぞお。</p>
<p>夜。ランニングサボり過ぎてるなあ。
誠に遺憾です。
晩御飯は鶏もも肉とそぼろ丼。</p>
<h3>Fragments</h3>
<p>『ディオファントスの一生』という曲を聞く。
初めて聞いたエピソード。
おしゃれな辞世の句だわね。</p>
