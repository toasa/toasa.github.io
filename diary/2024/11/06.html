スイングステートという州があって、そこでの勝敗が最終的な結果に大きく影響するらしい。
スイングステートの州が徐々に赤くなって、
終業時間ごろにはトランプ勝利が決まった。</p>
<p>Nintendo switch の後継機種が発表された。
「あつまれ どうぶつの森」やりたいなあ。</p>
