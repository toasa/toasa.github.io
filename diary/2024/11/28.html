		<div><h3>木曜日</h3>
<p>朝。ちょっと暖かい。ダウンジャケットはいらなかったな。</p>
<p>お仕事。ちょっと前進。
よしよし。</p>
<p>お昼休憩。理容・藤で散髪。<a href="https://github.com/toasa/diary/blob/main/2024/09/18.md">前回</a>から71日ぶり。
店内に入ると、店員のおじさまとおばさまが「徹子の部屋」を見てくつろいでいた。
今回の担当はおじさま。
休憩中に終わらせたかったので、シャンプーはスキップ。
これで1800円なので文句なし。</p>
<p>夜。キムチ鍋を作ってみたが、
食べている途中で胃のゾワゾワを感じ、箸を止めてしまった。
なんだろこれ。</p>
<p>写真は昨日撮って貼り忘れたもの。
雨上がりのレモングラス（多分）：</p>
