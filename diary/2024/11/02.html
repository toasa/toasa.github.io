		<h2>2024/11/02</h2>
		<div><h3>土曜日</h3>
<p>朝。早起き。眠いまま自宅に戻る。
明太フランスパンとシカゴピザ一片を近所のパン屋で買う。
電子レンジで温めたところ、フランスパンのカリカリ具合がなくなってしまった。
ただ、味は美味しい。ジャンクなものを食べる</p>
<p>お昼。お昼寝。雨がずっと降っていた。</p>
<p>夕方。雨やまず。ユニクロで衣類買う。
中央線高架下を歩く。</p>
