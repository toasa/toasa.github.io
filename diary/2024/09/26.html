		<div><h3>木曜日</h3>
<p>夏休み。</p>
<p>朝。武蔵境駅から東小金井駅までの高架下をランニングで往復。
下り方面は通勤通学中の方と多くすれ違って照れ臭い。</p>
<p>吉祥寺に移動。図書館で &quot;Effective Rust&quot; を読み始める。</p>
<p><a href="https://www.toraya-group.co.jp/shops/shop-25">とらや</a>で羊羹を買う。<a href="https://www.kichijoji-toraya.com/">店名が似たお店</a>があり間違いそうになる。
<a href="https://gf11433.gorp.jp/">いわい</a>でランチ。赤酢が強めに効いたお寿司だった：</p>
<img src="https://i.imgur.com/rf5X1on.jpeg" width="700">
<p>その後、前立腺炎症緩和用のクッションを探す、
バインミーエビアボカド味を食べる、
Baskin-Robbinsでチョコミントを食べる、
ピアノで和音を弾く、
よだれ鶏を食べる。</p>
