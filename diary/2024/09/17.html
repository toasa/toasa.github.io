		<h2>2024/09/17</h2>
		<div><h3>火曜日</h3>
<p>晴れ、あっつい日。</p>
<p>朝。８時間ほど寝て、スッキリ。
外は真夏ぐらい暑い。</p>
<p>お昼。武蔵野中央図書館まで散歩。</p>
<p>夜。鶏もも肉を焼いてレトルトカレーをかけて食べる。</p>
<h3>ことば</h3>
<p>隅の蜘蛛案じな煤はとらぬぞよ</p>
