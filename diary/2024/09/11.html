		<h2>2024/09/11</h2>
		<div><h3>水曜日</h3>
<p>朝。外が暑い。しぶとい夏。</p>
<p>鵠と書いて、くぐいと読む。
白鳥の古い言い方。</p>
<p>お昼。武蔵野中央図書館まで散歩。</p>
<p>夜。<a href="https://github.com/toasa/diary/blob/main/2022/11/18.md">二年ほど前に買った</a>味噌が切れたのでスーパーに行く。
<a href="https://www.maruman-miso.jp/shop/category/miso/mutenka/archives/1495">コクの極み</a>、
<a href="https://www.marukome.co.jp/product/detail/miso_001/">料亭の味</a>、<a href="https://www.hikarimiso.shop/c/miso/0983-8p">こだわってます</a>。
商品名だけだと何もわからなくて面白い。
無添加のものが多かったが、個人的には添加物がそれなりに入ってても美味しい方が嬉しい。
昔おばあちゃんの家で食べた白味噌が美味しかったことを思い出し、
マルマンの<a href="https://www.maruman-miso.jp/shop/category/miso/mutenka/archives/116">生みそ（白）</a>を買ってみた。</p>
