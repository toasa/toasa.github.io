		<h2>2024/09/18</h2>
		<div><h3>水曜日</h3>
<p>朝。お家で『ゼロから学ぶRust』の続きを読む。
大谷48-48!</p>
<p>お昼。理容・藤で散髪。<a href="https://github.com/toasa/diary/blob/main/2024/07/14.md">前回</a>から66日ぶり。
引越しからもう２ヶ月経ったのか。あっという間だな。
帰りに椿のコンディショナーを買う。</p>
<p>夜。予約していた『風の十二方位』を受け取りに武蔵野プレイスに向かうが、閉館日だった。
走りに行きたかったが、雷と大雨で断念。
晩御飯は鶏胸肉とニラの炒め物。</p>
