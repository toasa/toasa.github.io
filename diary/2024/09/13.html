		<div><h3>金曜日</h3>
<p>朝。5時ごろ目覚める。３連休が控えている嬉しさに昂っている。</p>
<p>お昼。相変わらずあっつい。
旧居まで散歩して、コンビニの塩おにぎりとちくわを食べる。</p>
<p>夜。境浄水場の周りをランニング。
晩御飯はうなぎ。フライパンにアルミホイルを引き、
その上にうなぎを乗せて温めた。
この加熱方法は以前うまく行った気がするが今回は失敗。
皮のゼラチン質がアルミホイルにくっついてしまい、
身の60%ほどしか剥がせなかった。
次は湯煎にするか。</p>
