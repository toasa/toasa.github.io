		<h2>2024/09/01</h2>
		<div><h3>日曜日</h3>
<p>朝。武蔵野プレイスで雑誌を読む。</p>
<p>お昼。
La Boulangere Poline で硬いパンを買う。
牛豚の合挽肉にパセリを入れてミートボールを作る。
人生で初めてのパセリ料理だったが、とても美味しかった。</p>
<p>3,4 時間お昼寝。</p>
<p>散歩に行って、ようつべをみる。</p>
