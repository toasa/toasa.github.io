		<div><h3>金曜日</h3>
<p>晴れ、暑い日。</p>
<p>朝。昨晩ランニングしたので、目覚めがスッキリ。</p>
<p>お昼。旧居まで散歩。掃除のおばさんを見かけたので、40分ほど雑談。
府中の孫が会いに来た話。</p>
<p>夜。スマホからギュインギュインという音。
神奈川が震源の地震発生。自分のところだと震度 3 or 4 だった。
かなり揺れを感じたので怖かった。</p>
