		<h2>2024/08/27</h2>
		<div><h3>火曜日</h3>
<p>朝。出勤直前までお家でだらだら。</p>
<p>お昼。会社を出ると大雨。
仕方ないので散歩は断念し、駐輪場でストレッチしてオフィスに戻る。</p>
<p>夜。近所のスーパーに生米が売っていない。
もうすぐ新米が入るようなので、パックごはんを消費していく。</p>
<h3>Fragments</h3>
<p>台風10号の進路がいつの間にか九州直撃コースになってた。
実家大丈夫かいな。</p>
