		<h2>2024/08/05</h2>
		<div><h3>月曜日</h3>
<p>晴れ、あっつい日。</p>
<p>朝。昨日はよく動いたので、体に心地よい疲れ。
出社ギリギリまでお家でだらだら。</p>
<p>お昼。暑い中散歩。
曇りだったが、風が少なく、しんどい気候。</p>
<p>夜。ランニングに行っても良いが、
体の疲れが取れていないので見送り。</p>
<h3>Fragments</h3>
<p>日経平均株価がめっちゃ下がったとニュースで知る。
まぁ自分は粛々とオルカンとS&amp;P500を買い続けるだけだな。</p>
<hr>
<p><a href="https://xtech.nikkei.com/atcl/nxt/column/18/00001/09568/">京都大学が経験則「ブロックチェーンのトリレンマ」を数式化、性能向上の足がかりに</a>。
ジレンマのジって２の意味のだったんだ。</p>
