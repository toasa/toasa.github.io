		<div><h3>木曜日</h3>
<p>曇り、暑い日。</p>
<p>朝。昨日走ったので、目覚めが良い。
1.5hほどお家でだらだらして出社。</p>
<img src="https://i.imgur.com/nSCejD8.jpg" width="500">
<p>お昼。会社周辺を散歩：</p>
<img src="https://i.imgur.com/P1PuZPR.jpg" width="500">
<p>夜。武蔵野プレイスが夜10時まで空いているため、晩飯後に行ってみる。
頭が疲れているためなかなか捗らないが、家でだらけて何もできない時間が過ぎるよりは気分がいい。
これからも体力に余裕がある日は行ってみようかな。</p>
