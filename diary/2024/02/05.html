		<h2>2024/02/05</h2>
		<div><h3>月曜日</h3>
<p>曇りのち雪。</p>
<p>朝。寒すぎる。複数の目覚ましを反故にして出勤直前まで寝てた。
寒いからしょうがないね。</p>
<p>お昼休憩。午後から雪の予報のため帰宅：</p>
<img src="https://i.imgur.com/6T72X88.jpg" width="700">
<p>18時8分。
防災武蔵野という近隣住民への放送で、大雪警報の発令を知る。</p>
<p>21時すぎ。
雷の音が聞こえる。</p>
<p>22時すぎ。井の頭公園を散歩。</p>
