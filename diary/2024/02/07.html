<p>出勤。横河電機のグラウンドは一部雪かきされていた：</p>
<img src="https://i.imgur.com/4C2iamD.jpg" width="700">
<p>お昼休憩。理容・藤で散髪。
店員のおじさんに、昼休憩中に来てるので50分ほどで切って欲しいとお願い。
快く了解いただいた。</p>
<p>夜。歩数ノルマが迫っていたので、井の頭公園を１周だけランニング。</p>
