		<h2>2024/12/19</h2>
		<div><h3>木曜日</h3>
<p>やる気ががが。</p>
<p>お昼。お腹はあまり空いてなかったが、
吉野家で牛皿定食を食べ、マクドナルドでハンバーガーを食べる。
こういう愚行としか言えない衝動がたまにやって来る。
そんな時は素直に従う。
万人に愚行権を。</p>
<p>午後からのお仕事。普段ならお昼以降のコーヒーは控えているが、今日は構わず飲む。
何しろ投げやりな一日を過ごしたい衝動が来ているので。
胃に収まった脂と糖が心地良い眠気へ誘う、と思ったがカフェインが効いてお仕事はそこそこ進んだ。</p>
<p>帰宅してようつべ見て冷凍餃子食べて寝る。</p>
