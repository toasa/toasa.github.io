		<h2>2025/08/06</h2>
		<div><h3>水曜日</h3>
<p>今日も吉祥寺図書館へ。
と思ったが、入り口が閉まってた。
水曜閉館とのこと、あらら。
仕方ないので近くのデパートのスタバに寄って事務作業。
作業後、ヨドバシカメラに寄ってマリカの体験版。
2回りほど歳が離れた男の子と２画面で遊ぶ。
コントローラーは4台あったので、お母さんと妹さんもできますよと声をかけてみたが、見てるだけでいいとのこと。
男の子は自分より圧倒的に上手くて、自分は下位集団でアイテムの使い方に難儀していて、彼は上位争いをしていた。</p>
