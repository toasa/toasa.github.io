		<h2>2025/02/02</h2>
		<div><h2>日曜日</h2>
<p>朝、近所のパン屋に行く。</p>
<p>お昼。ダイソーに行く。掃除道具を買う。</p>
<p>夜。スーパーに行く。恵方巻きが売ってたけど、
重量が軽かったため見送り。
煮物の材料を買って、食べた。</p>
<p>ホットスポット第四話。
給湯器の故障。主人公の遠藤さんが修理する。</p>
