		<h2>2025/11/22</h2>
		<div><h3>土曜日</h3>
<p>朝。BLE の復習。
BLE のアドレスの理解が間違っていたことに気づけてよかった。
ただ、PublicとRandom、StaticとPrivate という対は、同列の対になってなさそうで、名前がピンと来ないんだよな
（<a href="https://academy.nordicsemi.com/courses/bluetooth-low-energy-fundamentals/lessons/lesson-2-bluetooth-le-advertising/topic/bluetooth-address/">このあたり</a>のはなし）。</p>
<p>１の補数の足し算。
最上位桁で繰り上がりが発生した場合に、最下位桁に加える方法 (End-around carry)
用途として、TCP/IPPのチェックサムの計算があるらしい：
<a href="https://www.mew.org/~kazu/doc/bsdmag/cksum.html">IP チェックサムの秘密</a>。</p>
