		<div><h3>月曜日</h3>
<p>有給休暇。
出張の道中で遮光アイマスクを失くしてしまったことに気づく。
あちゃ。結構使ってたので痛いな。
もうしばらく様子を見て、やっぱり必要ならまた買おうかな。</p>
<p>お昼までお家でのんびり。
一度スーパーに買い出しに行って、パックの寿司と鶏肉を買う。
家で調理して、昼寝。３時間ほど寝て完全に回復。</p>
