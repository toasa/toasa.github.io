		<div><h3>木曜日</h3>
<p>朝。
郵便局で事務手続き。
時間に余裕がないことを伝えたら、対応を急がせてしまった。
申し訳ない。
対応は完了せずにお昼に持ち越し。</p>
<p>お昼休憩。郵便局に急ぎ寄る。手続き完了。
帰り間際、郵便局内で売っている<a href="https://www.shop.post.japanpost.jp/shop/pages/curry.aspx?srsltid=AfmBOookBJLG0YXVSqK1Wxdb-s8axLWNsykTuqBae4EIGjbb2d2lTNL0">カレー</a>を勧められる。
急がせてしまった恩もあるため1,200円分ぐらい買う。
美味しかったらまた買いに来てくださいね、とのこと。
ごめん。</p>
