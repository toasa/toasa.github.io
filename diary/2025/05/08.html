		<div><h3>木曜日</h3>
<p>Youtube で流れてきた動画。
桜井政博さんがシリーズものゲーム作品（全17作品？）を片手で数えててかっこよかった。
どうするかというと２進数を使う。
指が伸びた状態を０、折れた状態を１として、指折り数えていく。
この方法の何がいいかというと、中指だけ立てる危険なポーズにならない。
27まで行くとダメだけど。</p>
