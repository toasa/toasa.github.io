		<h2>2025/05/10</h2>
		<div><h3>土曜日</h3>
<p><a href="https://mame.github.io/ioccc-ja-spoilers/2020/endoh1.html">IOCCC 2020 の Yusuke Endoh さんの作品</a>が面白かったので、
自分でもターミナル上で遊ぶマインスイーパー作ってみる。
動作確認は mac だけ：</p>
<p><a href="https://github.com/toasa/mine-sweeper">https://github.com/toasa/mine-sweeper</a></p>
<img src="https://i.imgur.com/7EARqdt.png" width="700">
<p>セルを開けたとき、周囲の地雷数が0なら連鎖的に周囲のセルも開けるようにしている。
Endoh さんの作品のように、もっと賢く機械的にセルを処理できそう。
たとえば以下の状況だと右上のセルには自動でフラグを立てたい：</p>
<pre><code>
1 1 1
. . 1
. . 1
</code></pre>
