茹で加減がなかなかうまくてしっとり仕上がった。

<p>おとんおかんとビデオチャット。

おとんとおかんとで同じ体験をしつつ違う切り口で考えを持っていた。</p>
<p>電子レンジを粗大ゴミに出した。</p>
