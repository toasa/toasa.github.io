		<h2>2025/06/12</h2>
		<div><h3>木曜日</h3>
<p>お仕事。
ライブラリとライブラリを使うサンプルアプリがあって、
アプリ実行時に、使用しているライブラリの git ハッシュ値を知りたい
（正確なバージョンが知りたい）動機があった。
meson の <a href="https://mesonbuild.com/Reference-manual_functions.html#vcs_tag">vcs_tag()</a> で解決。
どう動くかというと、meson でのコンパイル時に <code>git rev-parse --short HEAD</code> を実行し、取得したハッシュ値をマクロ定数としてソースコードに埋め込む方法。</p>
