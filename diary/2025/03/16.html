		<div><h3>日曜日</h3>
<p>Chants of Sennaar の体験版を遊ぶ。
言葉を解読していくゲーム性、
解読や攻略を手助けする操作性、
端麗な絵画のような見た目、
とても面白かった。
製品版も買ってみよう。
あと、Return of the Obra Dinn
はクリアできずにやめちゃったけど、
再チャレンジしてみるか。</p>
