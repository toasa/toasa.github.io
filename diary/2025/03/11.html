		<h2>2025/03/11</h2>
		<div><h3>火曜日</h3>
<p>休暇。
豊洲シビックセンターに行く。
プロトコルスタック自作を進める。</p>
<p>有明スポーツセンターのジムにいく。</p>
<p>晩御飯は麻辣先生。
本場四川よだれ鶏、卵炒飯、海鮮香香鍋を注文。
海鮮香香鍋が辛かった。</p>
