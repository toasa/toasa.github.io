		<h2>2025/01/12</h2>
		<div><h3>日曜日</h3>
<p>代官山の蔦屋書店に行く。
スタバでコーヒーを飲む。
松屋でハンバーグ定食を食べる。
<a href="https://www.city.shibuya.tokyo.jp/shisetsu/bunka-shisetsu/asakura/asakura_00004.html">旧朝倉家住宅</a>を見る。
ららぽーとに行く。
銀だこでたこ焼きを食べる。
『<a href="https://www.nhk.jp/p/berabou/ts">べらぼう</a>』第一話、第二話みる。
元の濁りの田沼恋しき、の田沼さん。安定の賄賂政治。</p>
