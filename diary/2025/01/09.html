		<div><h3>木曜日</h3>
<p>親子丼を作る。
鶏もも肉を小ぶりに切り、
フライパンで軽く炒め、
玉ねぎを入れて、
希釈した白だしで煮込む。
いい感じに煮込んだら、溶き卵を回しかけ、
少し蓋をして卵を半熟にして完成。
うんまい。</p>
<p>今日も井の頭公園を散歩。よい天気：</p>
