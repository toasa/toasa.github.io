<img src="https://i.imgur.com/PpbRZuO.jpeg" width="700">
<p>夜。『<a href="https://www.iwanami.co.jp/book/b646698.html">数学者の思案</a>』を読む。
数学者から見た世界をまとめたエッセイ。
数学者として将来活躍する少年少女を見抜くことはできるか、
のようなわかりやすく興味を惹かれるエッセイもあっておもしろかった。
また、出版が2024年6月と最近なので、数学の証明をコンピュータで検証するはなしや、量子コンピュータの数学的側面のはなしもあった。</p>
