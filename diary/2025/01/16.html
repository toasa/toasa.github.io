		<div><h3>木曜日</h3>
<p><a href="https://www.nintendo.co.jp/corporate/release/2025/250116.html">「Nintendo Switch 2」を2025年に発売</a>。来た。動画でも紹介されているので、
ハードの発売に合わせてマリオカートの新作も来そう。
やりたいなあ。</p>
<p>お仕事。Android のグラフィクスまわりのドキュメントを書いたが、ツッコミをたくさん受ける。
粛々となおしてこ。</p>
<p>晩御飯。鶏胸肉を焼いたものに、帰省時におかんから頂いた<a href="https://www.gyomusuper.jp/product/detail.php?go_id=6202">姜葱醤</a>をのせて食べる。おいしい。
調べてみると他にも醬系のつけだれ商品があるらしい：<a href="https://dailyportalz.jp/kiji/gyoumu_super-marumaru_jan-kurabe">業務スーパーの「〇〇醤」9種食べ比べ</a>。気になる。</p>
