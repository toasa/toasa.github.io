		<div><h3>金曜日</h3>
<p>『<a href="https://ameblo.jp/imai-hiroshi/entry-12883211555.html">「京大近くにＹ字路が多い」の理由</a>』。
確かに鴨川デルタを起点に、左上、右上、真下のY字に川の流れがあって、その川に沿って道も作られたので、
鴨川デルタ以南は碁盤の目の道が多いし、
鴨川デルタ以北は斜めの道が多そう。</p>
<p>夜。友人Y氏とビデオチャット。新年を抱負を聞くなど。</p>
<p>晩御飯。<a href="https://boncurry.jp/lineup/neo_original/">ボンカレーネオ</a>の辛口。具がたくさん入ってて、かなり美味しい。</p>
