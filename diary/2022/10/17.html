		<div><h3>月曜日</h3>
<p>雨、涼しい日。</p>
<p>午前中は出社した。
先週はスポーツの日だったので二週間ぶり。</p>
<p>お昼休みにオーケーストアによって、晩ごはんの買い出しをした。
帰り道に近くの中華料理屋でニチニチソウが咲いていた：</p>
<img src="https://i.imgur.com/CLkNJFQ.jpg" width="500">
<p>お昼ごはんは、冷凍のビビンバチャーハン。
このところ良く食べているがまだ飽きない。</p>
<p>午後から在宅。
近くの小学校の音楽の授業で、リコーダーが聞こえていた。</p>
<p>晩ごはんは豚ロースと長ねぎの炒めもの。
すたみな源たれをかけて食べた。</p>
