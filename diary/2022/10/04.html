		<h2>2022/10/04</h2>
		<div><h3>火曜日</h3>
<p>晴れ、暑い日。</p>
<p>朝起きてランニング。
井の頭公園の西園を走った。</p>
<img src="https://i.imgur.com/jPw0i4o.jpg" width="700">
<p>7700 歩ほど。</p>
<p>暑いが窓を開けて仕事をする。
近所の小学校からまた音楽が聞こえる。
たぶんベートーベンの第九だと思う。
木管楽器の音で演奏者は一人だけ。
10 分ほどで止んでしまった。
休み時間に熱心な生徒が叩いているのかも。</p>
<p>お昼ごはんは食パンと冷凍の焼売。</p>
<p>晩ごはんは食パンと豚肉の炒めもの。
ピーナッツバターを塗って食べた。</p>
