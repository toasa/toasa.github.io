		<h2>2026/01/07</h2>
		<div><h3>水曜日</h3>
<p>TUN デバイスで、簡単なVPNを自作してみたいこのごろ。</p>
<hr>
<p>落穂拾い。英語だと gleaning。</p>
<hr>
<p><a href="https://manpages.ubuntu.com/manpages/trusty/en/man8/update-alternatives.8.html">update-alternatives</a>.
visudo で起動するエディタが nano で使いづらかったので、vim に変更。
<code>$sudo update-alternatives --config editor</code>。</p>
<hr>
<p>年始から使い始めたzsh。
bindkey でキーバインドの一覧が見れる。
↓は知らなかったな：</p>
<ul>
<li>&quot;^Y&quot; yank</li>
<li>&quot;^U&quot; kill-whole-line</li>
<li>&quot;^_&quot; undo</li>
</ul>
