		<h2>2023/08/01</h2>
		<div><h3>火曜日</h3>
<p>雨のち曇り。</p>
<p>朝、お家でのんびり。</p>
<p>午前中、仕事をしているとゴロゴロと雷の音。
続いて雨が降ったようで、お昼休みに外に出てみると地面が濡れていた：</p>
<img src="https://i.imgur.com/bzmsxQ4.jpg" width="500">
<p>雨自体は上がっていたので、散歩も快適。
気温は23度でとてもよい。雨上がり最高！：</p>
<img src="https://i.imgur.com/8BbLVer.png" width="500">
<p>晩御飯は鶏もも肉と小ネギの炒め物。</p>
