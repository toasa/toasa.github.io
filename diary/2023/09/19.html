		<h2>2023/09/19</h2>
		<div><h3>火曜日</h3>
<p>帰省初日。</p>
<p>5時起床。
5時31分三鷹発の中央線快速東京行きに乗る。
平日とはいえ、かなり早朝なので座れると期待したが、ダメだった。
しょうがないので、立ちで外を眺める。
総武線各停と抜きつ抜かれつする。
あちらは中央線と違い車内はガラガラ。
中野で座れたのでレース観戦は終了し、居眠りした。</p>
