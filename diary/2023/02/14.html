		<h2>2023/02/14</h2>
		<div><h3>火曜日</h3>
<p>晴れ、寒い日。</p>
<p>お昼休みは井の頭公園へ散歩に行った。</p>
<img src="https://i.imgur.com/wbSvlt5.jpg" width="500">
<p>予報だとバッチリ晴れなのだが、一部雨雲が出ていた。</p>
<p>先週金曜に仕事の小さな区切りがあり、今日はややその疲れが残っているように感じた。
頭がぼうっとしたり、若干頭痛が出ている。
大事をとって、明日は全休、金曜は午後休を取ることにした。
金曜の理由は自転車が届くため。</p>
<p>晩ごはんは吉祥寺で<a href="http://www.ajino-mingei.co.jp/bubuka/">ぶぶか</a>の油そばを食べた：</p>
<img src="https://i.imgur.com/bM4LsfM.jpg" width="700">
<p>見た目通りジャンクなお味。自分で作れそうな気もする。</p>
