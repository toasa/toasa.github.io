		<h2>2023/02/20</h2>
		<div><h3>月曜日</h3>
<p>晴れ、暖かい日。</p>
<p>朝、軽めに散歩。
週末の自転車で足の筋肉が疲れていたようで、
歩いてて少し違和感がある。
足が重たいという感じ。</p>
<p>いつもどおり出社。
視覚や音の情報が在宅勤務より段違いに多く、
疲れる気もするのだが、一方椅子が良い、など良いところもある。</p>
<p>お昼休みはオーケーストアでピザを買い、一度帰宅して食べた。
少し昼寝をして再出社。</p>
<p>晩ごはんは豚ロースと長ねぎの炒めもの。</p>
