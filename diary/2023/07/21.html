		<h2>2023/07/21</h2>
		<div><h3>金曜日</h3>
<p>曇り、暑い日。</p>
<p>朝。井の頭公園を30mほどランニング。
気温は26度ほどで、涼しい朝だった。</p>
<p>ランニング後は、
近所の公園で30mほど読書。</p>
<p>出勤。午後休暇をとったので、14時までお仕事。</p>
<p>14 時。一時帰宅。その後西八王子駅へ行った。</p>
