		<h2>2023/07/23</h2>
		<div><h3>日曜日</h3>
<p>昨日梅雨が明けたらしい。
やったー！</p>
<p>朝はお家でまったり。</p>
<p>昼。久々に武蔵野総合体育館のジムに行った。
バイク30m、ラン30m、バーピー15回x4で終了。</p>
<p>16 時から友人Y氏とビデオチャット。</p>
<p>晩御飯は鶏胸肉とキムチの炒め物。</p>
<p>21 時から
「<a href="https://www.amazon.co.jp/%E3%83%A1%E3%83%83%E3%82%BB%E3%83%BC%E3%82%B8-%E5%AD%97%E5%B9%95%E7%89%88-%E3%82%A8%E3%82%A4%E3%83%9F%E3%83%BC%E3%83%BB%E3%82%A2%E3%83%80%E3%83%A0%E3%82%B9/dp/B073XV6CGX">メッセージ</a>」を観た。
人類の言語学者が地球外生命体とコミュニケーションする話。
タイトルからはわからなかったが、原作はテッド・チャンの『あなたの人生の物語』だった。</p>
