<p>晴れ、暑い日。</p>
<p>朝。眠たかったので、出勤直前までお布団で待機。</p>
<p>お昼休憩。日差しが強烈なので公園までの散歩は諦め、

<p>終業後、歩数のノルマをこなす為散歩へ行く。
満月が出ていた：</p>
