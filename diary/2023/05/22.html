		<h2>2023/05/22</h2>
		<div><h3>月曜日</h3>
<p>曇りのち雨。</p>
<p>土日で結構動いたので、疲労が残るかなと思ったが、
ぐっすり寝れて、回復した。
日曜の晩にフランスパンを丸々一本食べたのが良かったのかも。</p>
<p>朝。近所の公園で30mほど読書。
通勤途中にガクアジサイが咲いていた：</p>
<img src="https://i.imgur.com/eW9vTdT.jpg" width="700">
<p>昼頃から雨の予定だったが、
確認するたびに後ろ倒しになり、
結局帰宅時も降らなかった。
前にもこんなことあった気がする。</p>
<p>晩御飯は、麻婆豆腐に鶏もも肉を入れたもの。</p>
