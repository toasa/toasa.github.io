		<h2>2023/05/08</h2>
		<div><h3>月曜日</h3>
<p>雨のち曇り、有給休暇。</p>
<p>朝。気持ち良く寝ていたが、登校中の児童の会話で目が覚めた。まあ良し。</p>
<p>午前中はスタバ西東京新町店で読書した。</p>
<p>道中にカルミアが咲いていた：</p>
<img src="https://i.imgur.com/YnTRoP5.jpg" width="700">
<p>お昼。武蔵野市立中央図書館で読書。
『短歌と俳句の五十番勝負』をパラパラと読んだ。</p>
<blockquote>
<p>動かざるいとど触覚のみ揺るる</p>
</blockquote>
<p>カマドウマの気持ち悪さを思い出す良い句だと思う。。
福島時代を思い出す。</p>
<p>夕方からは自宅でのんびり。未視聴のバラエティ番組を消化し、オーケー 杉並宮前店へ買い出しに行くなどした。</p>
<p>晩御飯は豚肉と玉ねぎの炒め物。</p>
