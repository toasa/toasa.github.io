		<div><h3>月曜日</h3>
<p>雨、寒い日。</p>
<p>朝。のどが痛い。
昨日就寝時に多少違和感があったので、今朝の不調は予想できていた。
予想外だったのは痛みの程度。
唾液を飲み込むのもズキンと感じる。
コロナの初期症状かもしれないし、単に風邪かもしれない。
幸い、のどの痛み以外の不調はない。要経過観察。</p>
<p>井の頭公園を1万歩歩き、鶏肉を食べて寝た。</p>
