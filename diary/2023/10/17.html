		<h2>2023/10/17</h2>
		<div><h3>火曜日</h3>
<p>晴れ、暖かい日。</p>
<p>朝。近所の公園で50mほど読書。
東浩紀氏の『<a href="https://www.amazon.co.jp/%E8%A8%82%E6%AD%A3%E3%81%99%E3%82%8B%E5%8A%9B-%E6%9C%9D%E6%97%A5%E6%96%B0%E6%9B%B8-%E6%9D%B1-%E6%B5%A9%E7%B4%80/dp/4022952385">訂正する力</a>』を読み始める。</p>
<p>お昼休憩。吉祥寺の無印まで自転車をとばす。
目的は先週の休日に買ったチノパンツ（ウエスト82cm, 股下82cm）の裾上げ。</p>
<p><a href="https://www.muji.com/jp/ja/store/cmdty/detail/4550512627050">https://www.muji.com/jp/ja/store/cmdty/detail/4550512627050</a></p>
<p>今日の夕方には出来上がっているとのこと。明日のお昼休みに取りに行こうかな。</p>
<p>終業後、井の頭公園を30mほどランニング。</p>
<p>晩御飯は鶏胸肉と玉ねぎの炒め物。</p>
