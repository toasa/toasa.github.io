		<h2>2023/10/02</h2>
		<div><h3>月曜日</h3>
<p>晴れ、涼しい日。</p>
<p>朝。近所の公園で40mほど読書。
『ルワンダ中央銀行総裁日記』読了。
素晴らしい本だった。
<a href="https://satoru-takeuchi.hatenablog.com/entry/2023/08/13/172654">武内覚さんも評されている</a>が、
全ての文章が論理的に簡潔で明晰。
昔のインテリはここまで凄かったのかと、気圧される感覚だった。
出勤前に読むことで、仕事の技術文章もしっかり書くぞ、と自分に発破を掛ける効果があった。</p>
<p>終業後、井の頭公園を25mほどランニング：</p>
<img src="https://i.imgur.com/Dm5ujEe.jpg" width="700">
<p>晩御飯は鶏胸肉と玉ねぎの炒め物。
残りバウエルンブロートも合わせて食べた。</p>
