		<h2>2023/06/22</h2>
		<div><h3>木曜日</h3>
<p>曇り時々雨、涼しい日。</p>
<p>朝。井の頭公園を20mほどランニング。
西園の競技場には芝生が生え始めていた：</p>
<img src="https://i.imgur.com/FooaIAx.jpg" width="700">
<p>お昼はいつも通り井の頭公園を散歩。</p>
<p>晩御飯は八王子の「金山村」で食事。
金山青菜炒飯、焼き餃子、海鮮あんかけ麺、四川麻婆豆腐を食べた。
麻婆豆腐はかなり山椒が効いていた。</p>
