		<div><h3>金曜日</h3>
<p>雨、肌寒い日。</p>
<p>7時すぎの目覚め。
どこかでテニスのボールを打ち合うような音が聞こえる。
窓の外も覗ってみたが、原因わからず。
二度寝の入眠に失敗。
おくびはサバの匂い。</p>
<p>朝。近所の公園で30mほど読書。</p>
<p>出勤。
<a href="https://www.rd.ntt/forum/2023/">NTT R&amp;D FORUM 2023</a>を見に行く：</p>
<img src="https://i.imgur.com/SLUcVcm.jpg" width="700">
<p>晩御飯。
会社のお客さんと<a href="https://www.kirincity.co.jp/shop/mitaka.html">キリンシティ三鷹</a>で飲み会。</p>
<h3>いちばんすきな花</h3>
<p>第6話 修羅場…友情にも嫉妬はある</p>
<p>紅葉氏、ゆくえ氏への好意は内に秘める。
ゆくえ氏、好意に気づいてた。
夜夜氏、依然椿氏がすこ。
椿氏、一人暮らし決意。</p>
