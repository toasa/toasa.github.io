		<div><h3>木曜日</h3>
<p>雨、生温い日。</p>
<p>天気予報によると、火曜日まで雨が続くらしい。。
雨は（少なくとも自分にとっては）悪いことしかない。
ジムへの足が遠のくし、週末のサイクリングも出来ない。
そういえば、インドアな趣味ってほとんど持ってないな。。</p>
<p>お昼休みは井の頭公園へ行った。
桜はほぼ満開だが、雨がかなり降っていたため、ほとんど人出はなかった：</p>
<img src="https://i.imgur.com/uV4GH7w.jpg" width="500">
